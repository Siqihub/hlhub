name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build dashboard
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m playwright install chromium
      - name: Run Python tests
        run: pytest -q
      - name: Build and inspect portable archive
        shell: powershell
        run: |
          .\scripts\build-portable.ps1
          if (-not (Test-Path output\AutoDy-Windows-Portable.zip.sha256)) { throw "checksum missing" }
          Expand-Archive output\AutoDy-Windows-Portable.zip output\ci-portable -Force
          $forbidden = @("config.yaml", "messages.txt", ".venv", "node_modules", "browser-profile", "avatar-cache", "account-profile", "account-avatar", "discovered_friends", "data\logs", "data\history", "data\preflight")
          $entries = Get-ChildItem output\ci-portable -Recurse -Force | ForEach-Object { $_.FullName.Substring((Resolve-Path output\ci-portable).Path.Length) }
          foreach ($item in $forbidden) { if ($entries | Where-Object { $_ -like "*$item*" }) { throw "sensitive portable entry: $item" } }
